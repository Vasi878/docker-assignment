<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaskFlow - Модерен Kanban за твоите задачи</title>
    <meta name="description" content="TaskFlow е бърз, сигурен и красив Kanban борд за управление на вашите ежедневни задачи. Разделен дизайн с Nginx, PHP API и MySQL.">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        
        <header>
            <h1 id="mainTitle">TaskFlow</h1>
            <p>Контейнеризиран Kanban борд с Docker Compose (Разделени Frontend & Backend)</p>
        </header>

        <main>
            <section class="stats-container" aria-label="Статистика на задачите">
                <div class="glass-panel stat-card stat-total" id="statTotalCard">
                    <div class="stat-val" id="statTotal">0</div>
                    <div class="stat-label">Общо Задачи</div>
                </div>
                <div class="glass-panel stat-card stat-todo" id="statTodoCard">
                    <div class="stat-val" id="statTodo">0</div>
                    <div class="stat-label">За изпълнение</div>
                </div>
                <div class="glass-panel stat-card stat-progress" id="statProgressCard">
                    <div class="stat-val" id="statProgress">0</div>
                    <div class="stat-label">В процес</div>
                </div>
                <div class="glass-panel stat-card stat-done" id="statDoneCard">
                    <div class="stat-val" id="statDone">0</div>
                    <div class="stat-label">Завършени</div>
                </div>
            </section>

            <div class="dashboard-grid">
                
                <aside class="glass-panel" aria-labelledby="formTitle">
                    <h2 class="form-title" id="formTitle">Нова Задача</h2>
                    <form id="taskForm">
                        <div class="form-group">
                            <label for="taskTitle">Заглавие</label>
                            <input type="text" id="taskTitle" name="title" class="form-control" placeholder="Напишете заглавие..." required>
                        </div>
                        <div class="form-group">
                            <label for="taskDesc">Описание</label>
                            <textarea id="taskDesc" name="description" class="form-control" placeholder="Добавете детайлно описание..."></textarea>
                        </div>
                        <div class="form-group">
                            <label for="taskPriority">Приоритет</label>
                            <select id="taskPriority" name="priority" class="form-control">
                                <option value="low">Нисък приоритет</option>
                                <option value="medium" selected>Среден приоритет</option>
                                <option value="high">Висок приоритет</option>
                            </select>
                        </div>
                        <button type="submit" class="btn btn-primary" id="btnSubmit">Добави Задача</button>
                    </form>
                </aside>

                <section class="board" id="kanbanBoard" aria-label="Kanban Борд">
                    
                    <div class="column todo-col" id="colTodo">
                        <div class="column-header">
                            <h3 class="column-title">
                                <svg width="18" height="18" fill="currentColor" viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-6h2v6zm0-8h-2V7h2v2z"/></svg>
                                За изпълнение
                            </h3>
                            <span class="column-badge" id="badgeTodo">0</span>
                        </div>
                        <div class="tasks-list" data-status="todo" id="todoList">
                        </div>
                    </div>

                    <div class="column progress-col" id="colProgress">
                        <div class="column-header">
                            <h3 class="column-title">
                                <svg width="18" height="18" fill="currentColor" viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 17.93c-3.95-.49-7-3.85-7-7.93 0-.62.08-1.21.21-1.79L9 15v1c0 1.1.9 2 2 2v1.93zm6.9-2.54c-.26-.81-1-1.39-1.9-1.39h-1v-3c0-.55-.45-1-1-1H8v-2h2c.55 0 1-.45 1-1V7h2c1.1 0 2-.9 2-2v-.41c2.93 1.19 5 4.06 5 7.41 0 2.08-.8 3.97-2.1 5.39z"/></svg>
                                В процес
                            </h3>
                            <span class="column-badge" id="badgeProgress">0</span>
                        </div>
                        <div class="tasks-list" data-status="in_progress" id="progressList">
                        </div>
                    </div>

                    <div class="column done-col" id="colDone">
                        <div class="column-header">
                            <h3 class="column-title">
                                <svg width="18" height="18" fill="currentColor" viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/></svg>
                                Завършени
                            </h3>
                            <span class="column-badge" id="badgeDone">0</span>
                        </div>
                        <div class="tasks-list" data-status="done" id="doneList">
                        </div>
                    </div>

                </section>

            </div>
        </main>

        <div class="toast-container" id="toastContainer" aria-live="polite"></div>

    </div>

    <script src="app.js"></script>
</body>
</html>
